<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex PBR | Sistema de Rastreamento</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

    <div class="pokedex-body">
        
        <div class="pokedex-left-panel">
            <div class="pokedex-header">
                <button id="theme-toggle" class="joystick-theme-btn" title="Modo Noturno">🌙</button>
                <div class="main-lens-container">
                    <div class="big-blue-lens"></div>
                    <div class="mini-lights">
                        <div class="light red"></div>
                        <div class="light yellow"></div>
                        <div class="light green"></div>
                    </div>
                </div>
                <h1 class="pokedex-title">POKEDEX <span>Poketibia PBR</span></h1>
            </div>

            <div class="pokedex-controls">
                
                <div class="search-module" id="search-module-container">
                    <span class="tech-label">SISTEMA DE BUSCA</span>
                    <div class="search-console">
                        <span class="cursor-blink">>_</span>
                        <input type="text" id="search-input" placeholder="NOME OU ID..." autocomplete="off">
                        <button id="search-btn" class="search-btn red-btn" title="Pesquisar">🔎</button>
                    </div>
                </div>

                <div class="category-module">
                    <button class="cat-btn active" data-cat="normal">NORMAL</button>
                    <button class="cat-btn" data-cat="boss">BOSS 24H</button>
                    <button class="cat-btn" data-cat="dark">DARK'S</button>
                    <button class="cat-btn" data-cat="mapas">MAPAS</button>
                </div>

                <div class="pokedex-filters" id="filters-container">
                    <button class="filter-toggle" id="toggle-gen">▼ FILTRAR POR REGIÃO</button>
                    <div class="filter-group hidden-filter" id="group-gen">
                        <div class="pills-container" id="gen-filters">
                            <button class="filter-pill" data-gen="1">KANTO</button>
                            <button class="filter-pill" data-gen="2">JOHTO</button>
                            <button class="filter-pill" data-gen="3">HOENN</button>
                            <button class="filter-pill" data-gen="4">SINNOH</button>
                            <button class="filter-pill active" data-gen="all">TODAS</button>
                        </div>
                    </div>

                    <button class="filter-toggle" id="toggle-type">▼ FILTRAR POR TIPO</button>
                    <div class="filter-group hidden-filter" id="group-type">
                        <div class="pills-container" id="type-filters">
                            </div>
                    </div>

                    <button class="filter-toggle" id="toggle-catch">▼ STATUS DA POKEDEX</button>
                    <div class="filter-group hidden-filter" id="group-catch">
                        <div class="pills-container" id="catch-filters">
                            <button class="filter-pill active" data-catch="all">TODOS</button>
                            <button class="filter-pill" data-catch="caught" style="background:#32cd32; color:#111;">REGISTRADOS</button>
                            <button class="filter-pill" data-catch="uncaught" style="background:#ff4b2b; color:#fff;">FALTANDO</button>
                        </div>
                    </div>
                </div>

                <div id="map-sidebar-menu" class="map-sidebar" style="display: none;">
                    <span class="tech-label" style="display: block; margin-bottom: 8px;">SISTEMA GPS GLOBAL</span>
                    <div id="map-list-container" class="map-list-scroll"></div>
                </div>

                <div class="dex-footer">
                    <div class="social-links">
                        <a href="https://pokemonbr.com/" target="_blank" title="Site Oficial" class="social-btn website-icon">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 2a10 10 0 100 20 10 10 0 000-20zm6.94 6h-2.93a15.17 15.17 0 00-1.39-3.35A8.03 8.03 0 0118.94 8zM12 4c.83 0 1.63 1.25 2.22 3.4H9.78C10.37 5.25 11.17 4 12 4zM4.26 14a7.96 7.96 0 010-4h3.38c-.06.65-.1 1.32-.1 2s.04 1.35.1 2H4.26zm.8 2h2.93c.33 1.27.81 2.41 1.39 3.35A8.03 8.03 0 015.06 16zm2.93-8H5.06a8.03 8.03 0 013.88-3.35A15.17 15.17 0 007.99 8zm4.01 12c-.83 0-1.63-1.25-2.22-3.4h4.44c-.59 2.15-1.39 3.4-2.22 3.4zm2.66-5.4H9.34c-.11-.83-.18-1.7-.18-2.6s.07-1.77.18-2.6h5.32c.11.83.18 1.7.18 2.6s-.07 1.77-.18 2.6zm.28 5.75c.58-.94 1.06-2.08 1.39-3.35h2.93a8.03 8.03 0 01-4.32 3.35zm1.39-7.75c.06-.65.1-1.32.1-2s-.04-1.35-.1-2h3.38a7.96 7.96 0 010 4h-3.38z"/></svg>
                        </a>
                        <a href="https://discord.com/invite/shDk84xZ?utm_source=Discord%20Widget&utm_medium=Connect" target="_blank" title="Discord" class="social-btn discord-icon">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.028zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                        </a>
                    </div>
                    <p class="footer-msg">Pokedex desenvolvida por <strong>Kalazatti</strong></p>
                </div>
            </div>
        </div>

        <div class="pokedex-right-panel">
            <div class="pokedex-main-display">
                
                <div class="pokemon-grid" id="pokedex-grid">
                </div>

                <div id="map-viewer-container" style="display: none; height: 100%; width: 100%;">
                    <div class="map-screen" style="height: 100%; width: 100%; position: relative; border: 4px solid var(--dex-border); border-radius: 12px; background: #2a2a2a; overflow: hidden; display: flex; flex-direction: column;">
                        
                        <div id="map-wrapper" style="width: 100%; height: 100%; cursor: grab; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: transparent;">
                            <div id="map-content" style="position: relative; display: inline-block;">
                                <img id="map-image" src="" alt="Mapa" style="max-width: 100%; height: auto; object-fit: contain; z-index: 2; transform-origin: center center; will-change: transform;">
                                <div id="map-pins-container"></div>
                                <div class="map-overlay" style="position: absolute; inset: 0; z-index: 4; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 2px, transparent 2px, transparent 4px);"></div>
                            </div>
                            
                            <div class="map-controls-vertical">
                                <button id="btn-zoom-in" class="zoom-btn" title="Aumentar Zoom">＋</button>
                                <button id="btn-zoom-reset" class="zoom-btn" title="Resetar Visão">🎯</button>
                                <button id="btn-zoom-out" class="zoom-btn" title="Diminuir Zoom">－</button>
                                
                                <div class="ctrl-divider"></div>
                                
                                <button id="btn-z-up" class="zoom-btn" title="Subir Andar">▲</button>
                                <div id="z-display" class="z-display-box">7</div>
                                <button id="btn-z-down" class="zoom-btn" title="Descer Andar">▼</button>
                            </div>

                            <div class="map-hud-floating">
                                <span class="blink" style="color:var(--dex-red);">● REC</span>
                                <span id="map-status-text">AGUARDANDO SINAL...</span>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="pokemon-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <div id="oak-modal" class="oak-overlay hidden">
        <div class="oak-container">
            <button class="oak-close-btn" id="close-oak">&times;</button>
            <div class="oak-screen">
                <div class="oak-sprite-area">
                    <img src="https://play.pokemonshowdown.com/sprites/trainers/oak.png" class="oak-sprite" alt="Professor Oak">
                </div>
                <div class="oak-dialog-box" id="oak-dialog-box">
                    <p id="oak-text"></p>
                    <span class="oak-arrow" id="oak-arrow">▼</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
